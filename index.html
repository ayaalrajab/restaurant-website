<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Shawarma Royale | Premium Lebanese Cuisine - Authentic Middle Eastern Flavors</title>
    <meta name="title" content="Shawarma Royale | Premium Lebanese Cuisine" />
    <meta name="description" content="Experience authentic Lebanese shawarma crafted with passion. Hand-marinated premium meats, traditional recipes, and a luxurious dining atmosphere." />
    <meta name="keywords" content="shawarma, lebanese food, middle eastern restaurant, premium dining, authentic shawarma, best shawarma, lebanese cuisine" />
    <meta name="author" content="Shawarma Royale" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shawarma Royale | Premium Lebanese Cuisine" />
    <meta property="og:description" content="Experience authentic Lebanese shawarma crafted with passion. Hand-marinated premium meats, traditional recipes." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Theme Colors -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="background-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.pexels.com" />

    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v18/inter-latin-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v18/inter-latin-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="https://fonts.gstatic.com/s/playfairdisplay/v37/playfairdisplay-latin-700.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      /* Critical CSS for initial load */
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #fff;
        font-family: 'Inter', system-ui, sans-serif;
        overflow-x: hidden;
      }

      /* Prevent flash of unstyled content */
      #root {
        min-height: 100vh;
        background: #0a0a0a;
      }

      /* Initial black screen */
      .initial-screen {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-screen"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
